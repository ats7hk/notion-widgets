<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Editable Countdown</title>
<style>
:root{--bg:#fff;--text:#111;--muted:#6f6f6f;--line:#d8d8d8}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{display:grid;place-items:center;overflow:hidden}
.widget{width:min(92vw,620px);text-align:center;padding:24px 26px;position:relative}
.line{height:1px;background:var(--line);margin:0 0 24px}.line.bottom{margin:24px 0 0}
.label{font-size:clamp(14px,3vw,18px);letter-spacing:.18em;font-weight:700;color:var(--muted);margin-bottom:18px}
.event{font-size:clamp(25px,6vw,42px);font-weight:700;margin-bottom:18px}
.days{font-size:clamp(58px,15vw,110px);line-height:.95;font-weight:800;letter-spacing:-.04em}
.days-word{font-size:clamp(18px,4vw,26px);font-weight:700;letter-spacing:.16em;margin-top:8px}
.weekday{margin-top:22px;font-size:clamp(18px,4vw,26px);font-weight:600}
.date{margin-top:5px;font-size:clamp(22px,5vw,34px);font-weight:700}
.edit{position:absolute;top:34px;right:30px;border:0;background:transparent;font-size:20px;cursor:pointer;opacity:.55}
dialog{border:0;border-radius:20px;padding:0;width:min(90vw,420px);box-shadow:0 18px 55px rgba(0,0,0,.18)}
dialog::backdrop{background:rgba(0,0,0,.24)}
.settings{padding:24px;background:#fff;text-align:left}
.settings h2{margin:0 0 20px;font-size:24px}
label{display:block;font-size:14px;font-weight:650;margin:14px 0 7px}
input{width:100%;border:1px solid #d5d5d5;border-radius:12px;padding:12px 13px;font:inherit;background:#fff}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.actions button{border:0;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer}
.cancel{background:#ececec}.save{background:#111;color:#fff}
</style>
</head>
<body>
<main class="widget">
<button class="edit" id="editBtn" aria-label="Edit countdown">⚙︎</button>
<div class="line"></div>
<div class="label">NEXT EVENT</div>
<div class="event" id="eventName">🏫 School Starts</div>
<div class="days" id="days">12</div>
<div class="days-word">DAYS</div>
<div class="weekday" id="weekday">Mon</div>
<div class="date" id="dateText">1 Sep 2026</div>
<div class="line bottom"></div>
</main>

<dialog id="settingsDialog">
<form class="settings" method="dialog">
<h2>Edit countdown</h2>
<label for="emoji">Emoji</label>
<input id="emoji" maxlength="4" value="🏫">
<label for="title">Event name</label>
<input id="title" value="School Starts">
<label for="targetDate">Event date</label>
<input id="targetDate" type="date" value="2026-09-01">
<div class="actions">
<button class="cancel" value="cancel">Cancel</button>
<button class="save" id="saveBtn" value="default">Save</button>
</div>
</form>
</dialog>

<script>
const defaults={emoji:"🏫",title:"School Starts",targetDate:"2026-09-01"};
let settings=JSON.parse(localStorage.getItem("countdownSettings")||"null")||defaults;

const eventName=document.getElementById("eventName");
const daysEl=document.getElementById("days");
const weekdayEl=document.getElementById("weekday");
const dateTextEl=document.getElementById("dateText");
const dialog=document.getElementById("settingsDialog");
const emojiInput=document.getElementById("emoji");
const titleInput=document.getElementById("title");
const targetDateInput=document.getElementById("targetDate");

function render(){
  const target=new Date(settings.targetDate+"T00:00:00");
  const today=new Date();
  today.setHours(0,0,0,0);
  const diff=Math.ceil((target-today)/86400000);

  eventName.textContent=settings.emoji+" "+settings.title;
  daysEl.textContent=Math.max(diff,0);
  weekdayEl.textContent=new Intl.DateTimeFormat("en-GB",{weekday:"short"}).format(target);
  dateTextEl.textContent=new Intl.DateTimeFormat("en-GB",{day:"numeric",month:"short",year:"numeric"}).format(target);
}

document.getElementById("editBtn").addEventListener("click",()=>{
  emojiInput.value=settings.emoji;
  titleInput.value=settings.title;
  targetDateInput.value=settings.targetDate;
  dialog.showModal();
});

document.getElementById("saveBtn").addEventListener("click",e=>{
  e.preventDefault();
  settings={
    emoji:emojiInput.value.trim()||"📅",
    title:titleInput.value.trim()||"Next Event",
    targetDate:targetDateInput.value||defaults.targetDate
  };
  localStorage.setItem("countdownSettings",JSON.stringify(settings));
  render();
  dialog.close();
});

render();
setInterval(render,60000);
</script>
</body>
</html>
