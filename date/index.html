<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today Date</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans TC",sans-serif;color:#111}
body{display:grid;place-items:center;overflow:hidden}
.card{text-align:center;padding:18px 22px}
.today{font-size:clamp(18px,4.5vw,34px);font-weight:600;letter-spacing:.04em;margin-bottom:8px}
.date{font-size:clamp(34px,9vw,76px);font-weight:750;line-height:1.1}
.weekday{font-size:clamp(20px,5.5vw,42px);font-weight:600;margin-top:10px}
</style>
</head>
<body>
<div class="card">
  <div class="today">TODAY</div>
  <div class="date" id="date"></div>
  <div class="weekday" id="weekday"></div>
</div>
<script>
function update(){
  const d=new Date();
  document.getElementById("date").textContent=new Intl.DateTimeFormat("zh-HK",{year:"numeric",month:"long",day:"numeric"}).format(d);
  document.getElementById("weekday").textContent=new Intl.DateTimeFormat("zh-HK",{weekday:"long"}).format(d);
}
update();setInterval(update,60000);
</script>
</body>
</html>
