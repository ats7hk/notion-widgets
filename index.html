<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hong Kong Weather</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans TC",sans-serif;color:#111}
body{display:grid;place-items:center;overflow:hidden}
.card{width:min(94vw,620px);padding:20px 24px;border-radius:24px;background:#f5f5f5;box-shadow:0 6px 22px rgba(0,0,0,.08)}
.top{display:flex;justify-content:space-between;align-items:center;gap:14px}
.location{font-size:clamp(18px,4vw,28px);font-weight:700}
.updated{font-size:clamp(11px,2.5vw,15px);color:#666;margin-top:4px}
.main{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.temp{font-size:clamp(52px,14vw,92px);font-weight:750;line-height:1}
.icon{font-size:clamp(52px,14vw,90px)}
.desc{font-size:clamp(18px,4vw,28px);font-weight:600;margin-top:8px}
.details{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-size:clamp(14px,3vw,18px)}
.error{font-size:18px;line-height:1.5}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="top">
    <div>
      <div class="location">香港天氣</div>
      <div class="updated" id="updated">更新中…</div>
    </div>
  </div>
  <div class="main">
    <div>
      <div class="temp" id="temp">--°</div>
      <div class="desc" id="desc">讀取天氣中</div>
    </div>
    <div class="icon" id="icon">⛅</div>
  </div>
  <div class="details">
    <span id="humidity">濕度 --%</span>
    <span id="wind">風速 -- km/h</span>
    <span id="range">最高 --° / 最低 --°</span>
  </div>
</div>
<script>
const map={
0:["晴朗","☀️"],1:["大致晴朗","🌤️"],2:["部分多雲","⛅"],3:["多雲","☁️"],
45:["有霧","🌫️"],48:["霧凇","🌫️"],51:["毛毛雨","🌦️"],53:["毛毛雨","🌦️"],55:["較大毛毛雨","🌧️"],
61:["小雨","🌦️"],63:["中雨","🌧️"],65:["大雨","🌧️"],71:["小雪","🌨️"],73:["中雪","🌨️"],75:["大雪","❄️"],
80:["驟雨","🌦️"],81:["較大驟雨","🌧️"],82:["猛烈驟雨","⛈️"],95:["雷暴","⛈️"],96:["雷暴及冰雹","⛈️"],99:["強雷暴及冰雹","⛈️"]
};
async function load(){
 try{
  const url="https://api.open-meteo.com/v1/forecast?latitude=22.3193&longitude=114.1694&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FHong_Kong&forecast_days=1";
  const r=await fetch(url);
  if(!r.ok) throw new Error("Weather request failed");
  const d=await r.json(), c=d.current, daily=d.daily;
  const info=map[c.weather_code]||["天氣狀況", "🌤️"];
  temp.textContent=Math.round(c.temperature_2m)+"°";
  desc.textContent=info[0]; icon.textContent=info[1];
  humidity.textContent="濕度 "+Math.round(c.relative_humidity_2m)+"%";
  wind.textContent="風速 "+Math.round(c.wind_speed_10m)+" km/h";
  range.textContent="最高 "+Math.round(daily.temperature_2m_max[0])+"° / 最低 "+Math.round(daily.temperature_2m_min[0])+"°";
  updated.textContent="最後更新 "+new Date().toLocaleTimeString("zh-HK",{hour:"2-digit",minute:"2-digit"});
 }catch(e){
  card.innerHTML='<div class="error">暫時未能讀取香港天氣。請稍後重新整理。</div>';
 }
}
load();setInterval(load,15*60*1000);
</script>
</body>
</html>
