<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Flip Clock</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f2f2f2;
      --text: #111111;
      --line: #d9d9d9;
      --shadow: rgba(0,0,0,.10);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .clock {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.3vw, 16px);
      padding: 12px;
    }

    .group {
      display: flex;
      gap: clamp(4px, .8vw, 10px);
    }

    .separator {
      color: var(--text);
      font-size: clamp(38px, 9vw, 96px);
      font-weight: 700;
      line-height: 1;
      transform: translateY(-4%);
    }

    .digit {
      position: relative;
      width: clamp(42px, 10vw, 104px);
      height: clamp(62px, 15vw, 154px);
      perspective: 700px;
    }

    .card,
    .flip {
      position: absolute;
      inset: 0;
      border-radius: clamp(8px, 1.5vw, 16px);
      overflow: hidden;
      color: var(--text);
    }

    .card {
      background: var(--card);
      box-shadow: 0 5px 18px var(--shadow);
    }

    .top,
    .bottom,
    .flip-top,
    .flip-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      font-size: clamp(48px, 12vw, 124px);
      font-weight: 700;
      line-height: 1;
      background: var(--card);
      user-select: none;
    }

    .top,
    .flip-top {
      top: 0;
      align-items: flex-end;
      border-bottom: 1px solid var(--line);
      transform-origin: bottom;
    }

    .bottom,
    .flip-bottom {
      bottom: 0;
      align-items: flex-start;
      border-top: 1px solid #ffffff;
      transform-origin: top;
    }

    .top span,
    .flip-top span { transform: translateY(50%); }

    .bottom span,
    .flip-bottom span { transform: translateY(-50%); }

    .flip {
      background: transparent;
      pointer-events: none;
    }

    .flip-top,
    .flip-bottom { backface-visibility: hidden; }

    .flip-top {
      z-index: 2;
      animation: flipTop .30s ease-in forwards;
    }

    .flip-bottom {
      transform: rotateX(90deg);
      animation: flipBottom .30s .30s ease-out forwards;
    }

    @keyframes flipTop {
      from { transform: rotateX(0deg); }
      to   { transform: rotateX(-90deg); }
    }

    @keyframes flipBottom {
      from { transform: rotateX(90deg); }
      to   { transform: rotateX(0deg); }
    }

    @media (max-width: 520px) {
      .clock { gap: 5px; padding: 8px; }
      .group { gap: 3px; }
    }
  </style>
</head>
<body>
  <main class="clock" aria-label="Flip clock">
    <div class="group">
      <div class="digit"></div>
      <div class="digit"></div>
    </div>
    <div class="separator">:</div>
    <div class="group">
      <div class="digit"></div>
      <div class="digit"></div>
    </div>
    <div class="separator">:</div>
    <div class="group">
      <div class="digit"></div>
      <div class="digit"></div>
    </div>
  </main>

  <script>
    const digits = [...document.querySelectorAll(".digit")];

    function makeCard(value) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="top"><span>${value}</span></div>
        <div class="bottom"><span>${value}</span></div>
      `;
      return card;
    }

    function currentTimeString() {
      return new Date().toLocaleTimeString("en-GB", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).replaceAll(":", "");
    }

    function setInitial() {
      const value = currentTimeString();
      digits.forEach((digit, i) => {
        digit.dataset.value = value[i];
        digit.appendChild(makeCard(value[i]));
      });
    }

    function flipDigit(digit, nextValue) {
      const currentValue = digit.dataset.value;
      if (currentValue === nextValue) return;

      const currentCard = digit.querySelector(".card");
      const nextCard = makeCard(nextValue);
      digit.insertBefore(nextCard, currentCard);

      const flip = document.createElement("div");
      flip.className = "flip";
      flip.innerHTML = `
        <div class="flip-top"><span>${currentValue}</span></div>
        <div class="flip-bottom"><span>${nextValue}</span></div>
      `;
      digit.appendChild(flip);

      setTimeout(() => {
        currentCard.remove();
        flip.remove();
        digit.dataset.value = nextValue;
      }, 650);
    }

    function updateClock() {
      const value = currentTimeString();
      digits.forEach((digit, i) => flipDigit(digit, value[i]));
    }

    setInitial();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
